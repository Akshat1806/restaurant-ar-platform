<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restaurant Menu</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:20px;
    background:#f5f5f5;
}

h1{
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:30px;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card h3{
    margin-bottom:15px;
}

.card a{
    text-decoration:none;
    background:#000;
    color:white;
    padding:10px 20px;
    border-radius:8px;
    display:inline-block;
}

</style>
</head>

<body>

<h1>Restaurant Menu</h1>

<div class="grid">

    <div class="card">
        <h3>Classic Burger</h3>
        <a href="./dishes/classic-burger/">
            View in AR
        </a>
    </div>

</div>

</body>
</html>
