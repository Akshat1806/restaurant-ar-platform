<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Classic Burger | AR Menu</title>

  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
  </script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial,sans-serif;
      background:#f5f5f5;
    }

    .header{
      background:white;
      padding:20px;
      text-align:center;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
    }

    .header h1{
      font-size:28px;
      margin-bottom:8px;
    }

    .header p{
      color:#666;
      font-size:14px;
    }

    .viewer-container{
      position:relative;
      width:100%;
    }

    .info{
      background:white;
      padding:24px;
      text-align:center;
      margin-top:10px;
    }

    .info h2{
      margin-bottom:10px;
    }

    .info p{
      color:#666;
      line-height:1.6;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Classic Burger</h1>
    <p>View in 3D or place it directly on your table using AR</p>
  </div>

  <div class="viewer-container">

    <model-viewer
      src="burger.glb"
      alt="Classic Burger"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1.1"
      loading="eager"
      style="width:100%;height:75vh;background:#fff">

      <button slot="ar-button" style="
        position:absolute;
        bottom:24px;
        left:50%;
        transform:translateX(-50%);
        background:#111;
        color:white;
        border:none;
        padding:14px 28px;
        border-radius:30px;
        font-size:15px;
        font-weight:600;
        cursor:pointer;
        box-shadow:0 4px 16px rgba(0,0,0,0.25);
        letter-spacing:0.3px;
      ">
        📱 Place on your table
      </button>

    </model-viewer>

  </div>

  <div class="info">
    <h2>Classic Burger</h2>
    <p>
      Rotate, zoom, and inspect the burger in 3D.
      Tap "Place on your table" on supported devices to preview the dish in your real environment using Augmented Reality.
    </p>
  </div>

</body>
</html>
