<model-viewer
  src="burger.glb"
  alt="Classic Burger"
  ar
  ar-modes="webxr scene-viewer quick-look"
  camera-controls
  auto-rotate
  shadow-intensity="1"
  exposure="1.1"
  loading="eager"
  style="width:100%;height:75vh;background:#fff">

  <!-- THIS IS THE MISSING PIECE -->
  <button slot="ar-button" style="
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    color: white;
    border: none;
    padding: 14px 28px;
    border-radius: 30px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    letter-spacing: 0.3px;
  ">
    📱 Place on your table
  </button>

</model-viewer>
