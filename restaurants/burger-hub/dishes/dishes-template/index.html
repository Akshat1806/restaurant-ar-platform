<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Dish Viewer</title>

<script type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
</script>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.header{
    text-align:center;
    padding:20px;
    background:white;
}

model-viewer{
    width:100%;
    height:75vh;
    background:white;
}

.info{
    padding:20px;
    text-align:center;
    background:white;
}

</style>

</head>

<body>

<div class="header">
    <h1>Dish Name</h1>
</div>

<model-viewer
src="model.glb"
alt="Dish Model"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
auto-rotate
shadow-intensity="1"
loading="eager">
</model-viewer>

<div class="info">
    <p>Rotate, zoom, or place this dish in your space using AR.</p>
</div>

</body>
</html>
